# ============================================================
# Infinite-Canvas 服务器部署用 docker-compose
# ============================================================
# 使用方法：
#   1. 将本文件重命名为 docker-compose.yml（或直接使用）
#   2. 将 .env 文件放在同级目录
#   3. 将导出的镜像 tar.gz 文件 load 进去：docker load -i infinite-canvas-xxx.tar.gz
#   4. 启动：docker compose up -d
# ============================================================

services:
  infinite-canvas:
    image: infinite-canvas:latest
    container_name: infinite-canvas
    ports:
      - "3000:3000"
    volumes:
      # 挂载数据目录，持久化画布、运行历史和用户配置
      - ./data:/app/data
      # 挂载素材库目录，持久化上传和生成的图片/音视频素材
      - ./assets:/app/assets
      # 挂载 .env 配置文件，持久化 API Key 等环境变量
      - ./.env:/app/.env
      # 挂载输出目录
      - ./output:/app/output
      # 挂载工作流目录，防止上传的自定义 ComfyUI 工作流丢失
      - ./workflows:/app/workflows
    # 允许容器通过 host.docker.internal 访问宿主机上运行的服务
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
