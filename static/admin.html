<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员面板</title>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/js/tailwindcss-cdn.js?v=2026.07.02.1779934979"></script>
    <script src="/static/vendor/js/lucide.js?v=2026.07.02.1779934979"></script>
    <script src="/static/js/theme.js?v=2026.07.02.1783065330"></script>
    <script src="/static/js/i18n.js?v=2026.07.02.1783071486"></script>
    <link rel="stylesheet" href="/static/css/theme.css?v=2026.07.02.1782978625">
    <link rel="stylesheet" href="/static/css/admin.css?v=2026.07.02.1783069245">
</head>
<body>
    <div class="page">
        <div class="wrap">
            <header class="page-head">
                <div>
                    <div class="title" data-i18n="admin.title">管理员面板</div>
                    <div class="sub" data-i18n="admin.subtitle">管理用户账户、重置密码和启用/禁用用户</div>
                </div>
                <div id="status" class="status"></div>
            </header>

            <div class="layout">
                <aside class="sidebar">
                    <div class="side-section-title" data-i18n="admin.userList">用户列表</div>
                    <div id="userListContainer" class="user-list-container"></div>
                </aside>

                <main class="content">
                    <div class="content-head">
                        <div>
                            <div id="editorTitle" class="editor-title" data-i18n="admin.userList">用户管理</div>
                            <div class="editor-sub" data-i18n="admin.subtitle">管理所有用户账户</div>
                        </div>
                    </div>

                    <section class="block">
                        <div class="block-head">
                            <div>
                                <div class="block-title" data-i18n="admin.userList">用户列表</div>
                                <div class="block-desc" id="userCountDesc">共 0 位用户</div>
                            </div>
                            <div class="content-actions">
                                <button class="action-btn" type="button" onclick="loadUsers()">
                                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                                    <span data-i18n="common.save">刷新</span>
                                </button>
                            </div>
                        </div>

                        <div class="user-table-wrap">
                            <table class="user-table">
                                <thead>
                                    <tr>
                                        <th data-i18n="admin.username">用户名</th>
                                        <th data-i18n="admin.displayName">显示名称</th>
                                        <th data-i18n="admin.role">角色</th>
                                        <th data-i18n="admin.status">状态</th>
                                        <th data-i18n="admin.createdAt">创建时间</th>
                                        <th data-i18n="admin.actions">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="userTableBody">
                                    <tr>
                                        <td colspan="6" class="empty-row" data-i18n="admin.loadingUsers">加载中...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>

                    <section class="block">
                        <div class="block-head">
                            <div>
                                <div class="block-title" data-i18n="admin.retention">数据保留天数</div>
                                <div class="block-desc" data-i18n="admin.retentionDesc">设置用户数据自动清理的保留天数，0 表示永久保留</div>
                            </div>
                        </div>
                        <div class="retention-form">
                            <label class="field">
                                <span class="label" data-i18n="admin.retention">保留天数</span>
                                <div class="field-frame"><input id="retentionInput" type="number" min="0" value="0"></div>
                                <span class="hint" id="retentionHint" data-i18n="admin.retentionPermanent">永久保留</span>
                            </label>
                            <button class="action-btn save-btn" type="button" onclick="saveRetention()">
                                <i data-lucide="save" class="w-3.5 h-3.5"></i>
                                <span data-i18n="admin.save">保存</span>
                            </button>
                        </div>
                    </section>
                </main>
            </div>
        </div>
    </div>

    <!-- 重置密码弹窗 -->
    <div id="resetPasswordModal" class="modal" hidden>
        <div class="modal-panel">
            <div class="modal-head">
                <div>
                    <div class="modal-kicker" data-i18n="admin.resetPassword">重置密码</div>
                    <h3 class="modal-title" id="resetPasswordTitle">重置用户密码</h3>
                </div>
                <button class="modal-close" type="button" onclick="closeResetPasswordModal()">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="modal-body">
                <label class="field full">
                    <span class="label" data-i18n="admin.newPassword">新密码</span>
                    <div class="field-frame"><input id="newPasswordInput" type="text" placeholder="123456"></div>
                    <span class="hint" data-i18n="admin.passwordHint">密码长度 4-50 位</span>
                </label>
            </div>
            <div class="modal-actions">
                <button class="action-btn" type="button" onclick="closeResetPasswordModal()" data-i18n="admin.cancel">取消</button>
                <button class="action-btn save-btn" type="button" onclick="confirmResetPassword()" data-i18n="admin.confirm">确定</button>
            </div>
        </div>
    </div>

    <script src="/static/js/admin.js?v=2026.07.02.1783072762"></script>
</body>
</html>
