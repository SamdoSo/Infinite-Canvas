<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>在线生图</title>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>

    <style>
        @import url('/static/vendor/css/fonts.css?v=2026.07.15.1782696732');
        :root { --accent:#111827; --bg:#f9fafb; --card:#fff; --easing:cubic-bezier(0.4,0,0.2,1); }
        body { background:var(--bg); font-family:'Inter',-apple-system,sans-serif; color:var(--accent); -webkit-font-smoothing:antialiased; }
        .container-box { max-width:1280px; margin:0 auto; padding:0 40px; margin-top:50px; }
        .nano-input { background:var(--card); border:1px solid #eef0f2; transition:all .3s var(--easing); }
        .nano-input:focus { border-color:#000; box-shadow:0 0 0 1px #000; }
        .upload-item { background:var(--card); border:1px dashed #e2e8f0; transition:all .4s var(--easing); position:relative; overflow:hidden; }
        .upload-item:hover,.upload-item.drag-over { border-color:#000; transform:translateY(-2px); }
        .preview-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; animation:fadeIn .5s var(--easing); }
        .glass-btn { background:#111827; transition:all .3s var(--easing); }
        .glass-btn:hover { background:#000; transform:translateY(-1px); box-shadow:0 12px 24px rgba(0,0,0,.1); }
        .result-frame { background:#fff; border-radius:32px; border:1px solid #f1f5f9; box-shadow:0 2px 15px rgba(0,0,0,.02); }
        .tool-panel { background:#fff; border:1px solid #edf0f3; border-radius:24px; padding:12px; display:flex; flex-direction:column; gap:10px; }
        .model-pill { background:#f8fafc; border:1px solid #edf2f7; border-radius:999px; padding:3px; display:grid; grid-template-columns:1fr 1fr; gap:2px; }
        .model-option { border-radius:999px; height:34px; display:flex; align-items:center; justify-content:center; gap:6px; color:#64748b; font-size:10px; font-weight:600; letter-spacing:.02em; transition:all .25s var(--easing); }
        .model-option.active { background:#fff; color:#111827; box-shadow:0 1px 3px rgba(15,23,42,.08); }
        .control-panel { background:#fff; border:1px solid #edf0f3; border-radius:24px; padding:12px; display:flex; flex-direction:column; gap:10px; }
        .control-label { display:flex; align-items:center; gap:6px; color:#94a3b8; font-size:10px; font-weight:600; letter-spacing:.04em; }
        .size-row { display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:8px; align-items:start; }
        .size-field { min-width:0; display:flex; flex-direction:column; gap:6px; }
        .size-select { width:100%; min-width:0; max-width:100%; height:34px; border:1px solid #edf2f7; border-radius:14px; background:#f8fafc; color:#111827; outline:none; padding:0 10px; font-size:11px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .size-select:disabled { opacity:.55; cursor:not-allowed; }
        .size-input-row { display:flex; gap:6px; align-items:center; }
        .size-input { flex:1; min-width:0; height:34px; border:1px solid #edf2f7; border-radius:14px; background:#fff; color:#111827; outline:none; padding:0 12px; font-size:11px; font-weight:700; font-family:inherit; transition:all .2s var(--easing); }
        .size-input:focus { border-color:#000; box-shadow:0 0 0 1px #000; }
        .size-fit-btn { height:34px; border:1px solid #edf2f7; border-radius:14px; background:#fff; color:#111827; padding:0 12px; font-size:10px; font-weight:800; white-space:nowrap; cursor:pointer; transition:all .2s var(--easing); }
        .size-fit-btn:hover:not(:disabled) { background:#111827; color:#fff; border-color:#111827; }
        .size-fit-btn:disabled { opacity:.45; cursor:not-allowed; }
        .size-presets { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
        .size-preset-btn { height:28px; border:1px solid #edf2f7; border-radius:10px; background:#f8fafc; color:#64748b; padding:0 10px; font-size:10px; font-weight:700; cursor:pointer; transition:all .2s var(--easing); white-space:nowrap; }
        .size-preset-btn:hover { border-color:#111827; color:#111827; }
        .size-preset-btn.active { background:#111827; color:#fff; border-color:#111827; }
        .mode-badge { font-size:9px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; color:#0f172a; background:#eef2ff; border:1px solid #e0e7ff; padding:2px 8px; border-radius:999px; }
        .masonry-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }
        @media (min-width:768px){ .masonry-grid{ grid-template-columns:repeat(4,1fr); } }
        @media (max-width:640px){ .size-row{ grid-template-columns:1fr; } }
        .masonry-item { aspect-ratio:1/1; border-radius:24px; overflow:hidden; background:#fff; border:1px solid #f1f5f9; transition:all .5s var(--easing); }
        .masonry-item:hover { transform:translateY(-6px); box-shadow:0 20px 40px rgba(0,0,0,.08); }
        .gallery-lightbox { background:rgba(255,255,255,.99); -webkit-backdrop-filter:blur(22px) saturate(1.05); backdrop-filter:blur(22px) saturate(1.05); }
        .output-grid { display:grid; gap:16px; padding:24px; width:100%; height:100%; }
        .output-grid.single { grid-template-columns:1fr; place-items:center; }
        .output-grid.multi { grid-template-columns:repeat(2,1fr); grid-auto-rows:1fr; }
        .output-grid img { width:100%; height:100%; object-fit:contain; cursor:zoom-in; border-radius:16px; background:#f8fafc; transition:transform .3s var(--easing); }
        .output-grid.multi img { object-fit:cover; aspect-ratio:1/1; }
        .output-grid img:hover { transform:scale(1.02); }
        .history-thumbs { display:grid; gap:2px; width:100%; height:100%; }
        .history-thumbs.count-1 { grid-template-columns:1fr; }
        .history-thumbs.count-2 { grid-template-columns:1fr 1fr; }
        .history-thumbs.count-3 { grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
        .history-thumbs.count-3 img:nth-child(1) { grid-row:span 2; }
        .history-thumbs.count-4 { grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
        .history-thumbs img { width:100%; height:100%; object-fit:cover; display:block; }
        .lightbox-nav { position:absolute; top:50%; transform:translateY(-50%); width:48px; height:48px; border-radius:999px; background:rgba(0,0,0,.6); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:20; transition:background .2s; }
        .lightbox-nav:hover { background:#000; }
        .lightbox-nav.prev { left:20px; }
        .lightbox-nav.next { right:20px; }
        .lightbox-page { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.6); color:#fff; padding:6px 14px; border-radius:999px; font-size:11px; font-weight:700; pointer-events:none; z-index:10; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    </style>

                <section class="space-y-4">
                    <div class="flex items-center gap-2 text-gray-400">

                        <span class="text-[10px] font-black uppercase tracking-widest" data-i18n="online.referenceImages">Reference Images</span>
                    </div>
                    <div class="grid grid-cols-3 gap-4">
                        <div id="drop-zone-1" onclick="document.getElementById('file1').click()" class="upload-item group aspect-square rounded-2xl flex flex-col items-center justify-center cursor-pointer">
                            <input type="file" id="file1" accept="image/*" class="hidden" onchange="handleFile(this.files[0],1)">
                            <i data-lucide="plus" class="w-5 h-5 text-gray-300 group-hover:text-black"></i><span class="text-[9px] mt-2 font-bold text-gray-400 uppercase">Main</span>
                            <img id="prev1" class="preview-img hidden"><button id="del1" onclick="clearSlot(1,event)" class="hidden absolute top-2 right-2 w-6 h-6 bg-white/90 rounded-full shadow-sm z-10">×</button>
                        </div>
                        <div id="drop-zone-2" onclick="document.getElementById('file2').click()" class="upload-item group aspect-square rounded-2xl flex flex-col items-center justify-center cursor-pointer">
                            <input type="file" id="file2" accept="image/*" class="hidden" onchange="handleFile(this.files[0],2)">
                            <i data-lucide="plus" class="w-5 h-5 text-gray-300 group-hover:text-black"></i><span class="text-[9px] mt-2 font-bold text-gray-400 uppercase">Aux A</span>
                            <img id="prev2" class="preview-img hidden"><button id="del2" onclick="clearSlot(2,event)" class="hidden absolute top-2 right-2 w-6 h-6 bg-white/90 rounded-full shadow-sm z-10">×</button>
                        </div>
                        <div id="drop-zone-3" onclick="document.getElementById('file3').click()" class="upload-item group aspect-square rounded-2xl flex flex-col items-center justify-center cursor-pointer">
                            <input type="file" id="file3" accept="image/*" class="hidden" onchange="handleFile(this.files[0],3)">
                            <i data-lucide="plus" class="w-5 h-5 text-gray-300 group-hover:text-black"></i><span class="text-[9px] mt-2 font-bold text-gray-400 uppercase">Aux B</span>
                            <img id="prev3" class="preview-img hidden"><button id="del3" onclick="clearSlot(3,event)" class="hidden absolute top-2 right-2 w-6 h-6 bg-white/90 rounded-full shadow-sm z-10">×</button>
                        </div>
                    </div>
                </section>

                <div class="tool-panel">
                    <div class="control-label">
                        <i data-lucide="sliders-horizontal" class="w-3.5 h-3.5"></i>
                        <span data-i18n="online.model">Model</span>
                        <span id="providerModeBadge" class="mode-badge" style="margin-left:auto;display:none;"></span>
                    </div>
                    <div class="size-row">
                        <label class="size-field">
                            <select id="providerSelect" class="size-select" onchange="setProvider(this.value)"></select>
                        </label>
                        <label class="size-field">
                            <select id="modelSelect" class="size-select" onchange="setModel(this.value)"></select>
                        </label>
                    </div>
                    <div id="adaptiveExtras" class="size-row" style="margin-top:2px;">
                        <label id="qualityField" class="size-field">
                            <select id="qualitySelect" class="size-select" onchange="setQuality(this.value)" title="Quality">
                                <option value="auto" data-i18n="online.qualityAuto">自动</option>
                                <option value="low" data-i18n="online.qualityLow">低</option>
                                <option value="medium" data-i18n="online.qualityMedium">中</option>
                                <option value="high" data-i18n="online.qualityHigh">高</option>
                            </select>
                        </label>
                        <label id="countField" class="size-field">
                            <select id="countSelect" class="size-select" onchange="setCount(this.value)" title="Count">
                                <option value="1" selected>×1</option>
                                <option value="2">×2</option>
                                <option value="3">×3</option>
                                <option value="4">×4</option>

                        <span data-i18n="online.size">Size</span>
                    </div>
                    <div>
                        <div class="size-input-row">
                            <input id="sizeInput" class="size-input" type="text" value="1024x1024" placeholder="1024x1024" title="WxH 格式，如 1024x1024，或 auto" data-i18n-placeholder="online.sizePlaceholder">

                        <div id="sizePresets" class="size-presets">

                            <button type="button" class="size-preset-btn active" data-size="1024x1024">1024×1024</button>
                            <button type="button" class="size-preset-btn" data-size="1536x1024">1536×1024</button>
                            <button type="button" class="size-preset-btn" data-size="1024x1536">1024×1536</button>

                    <div id="placeholder" class="text-center space-y-4 opacity-20"><i data-lucide="layout" class="w-12 h-12 mx-auto stroke-[1px]"></i><p class="text-[10px] font-black tracking-[0.5em] uppercase" data-i18n="online.canvasReady">Canvas Ready</p></div>
                    <div id="loader" class="hidden text-center space-y-4"><div class="w-8 h-8 border-2 border-black border-t-transparent rounded-full animate-spin mx-auto"></div><p class="text-[10px] font-black tracking-[0.5em] uppercase" data-i18n="online.generating">Generating</p></div>
                    <div id="outputGrid" class="hidden output-grid single"></div>
                    <a id="downloadBtn" href="#" download class="hidden absolute top-8 right-8 w-12 h-12 bg-white/90 shadow-2xl rounded-2xl flex items-center justify-center hover:bg-black hover:text-white"><i data-lucide="download" class="w-4 h-4"></i></a>
                </div>
            </div>
        </main>

        <section class="mt-32">
            <div class="flex items-center gap-6 mb-12"><h2 class="text-[11px] font-black uppercase tracking-[0.5em]" data-i18n="online.archives">Archives</h2><div class="h-px flex-1 bg-gray-100"></div></div>
            <div id="masonry" class="masonry-grid"></div>
            <div id="loadMoreTrigger" class="py-20 text-center text-gray-300 text-[10px] font-bold uppercase tracking-widest cursor-pointer hover:text-black">Load More Archive</div>
        </section>

    <div id="lightbox" onclick="handleOutsideClick(event)" class="hidden fixed inset-0 z-50 gallery-lightbox flex flex-col items-center justify-center p-8">
        <button onclick="closeLightbox()" class="absolute top-10 right-10 text-gray-400 hover:text-black"><i data-lucide="x" class="w-8 h-8"></i></button>
        <button id="lightboxPrev" onclick="lightboxNavigate(-1,event)" class="lightbox-nav prev hidden"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
        <button id="lightboxNext" onclick="lightboxNavigate(1,event)" class="lightbox-nav next hidden"><i data-lucide="chevron-right" class="w-6 h-6"></i></button>
        <div class="w-full flex flex-col items-center pointer-events-none" style="max-width:min(1280px, 92vw)">

                <div id="lightboxPageIndicator" class="lightbox-page hidden">1 / 1</div>
                <div data-no-pan class="absolute top-6 left-6 bg-black/50 backdrop-blur-md text-white px-3 py-1.5 rounded-xl text-[10px] font-black tracking-widest shadow-2xl pointer-events-auto z-10">

                </div>
                <button id="lightboxDownload" onclick="downloadLightboxImage(event)" data-no-pan class="absolute top-6 right-6 bg-black text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-2xl hover:scale-105 transition-transform pointer-events-auto z-10">

                    <span class="text-[9px] font-black text-gray-300 uppercase tracking-widest block mb-2">Prompt</span>
                    <p id="lightboxPrompt" class="text-gray-700 text-sm leading-relaxed max-h-32 overflow-y-auto pr-2"></p>
                </div>
                <button id="sameStyleBtn" onclick="applySameStyle()" class="bg-black text-white px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2"><i data-lucide="copy" class="w-4 h-4"></i><span data-i18n="online.reuse">Reuse</span></button>
            </div>
        </div>

    <script>
        lucide.createIcons();
        function tr(key){ return window.StudioI18n ? StudioI18n.t(key) : key; }
        function applyLanguage(lang){
            if(lang && window.StudioI18n) StudioI18n.set(lang);
            document.title = tr('online.title');
            const loader = document.getElementById('loadMoreTrigger');
            if(loader && !isLoading) loader.innerText = tr('online.loadMore');
        }
        window.addEventListener('message', event => {
            if(event.data?.type === 'studio-lang') applyLanguage(event.data.lang);
            // API 设置页通过 postMessage 通知平台/模型变更（iframe 内嵌场景）
            if(event.data?.type === 'providers-changed' || event.data?.type === 'workflows-changed') scheduleProviderRefresh();
        });
        window.addEventListener('studio-lang-change', () => {
            document.title = tr('online.title');
            updateAdaptivePanel();
        });
        let refs = {1:null,2:null,3:null};
        let refDims = {1:null,2:null,3:null};
        let provider = 'comfly';
        let selectedModel = 'gpt-image-2';
        let apiProviders = [];
        let imageSize = '1024x1024';
        let quality = 'auto';
        let outputCount = 1;
        let models = {gpt:'gpt-image-2', nano:'nano-banana-pro'};
        let allHistory = [], currentIndex = 0, currentResult = null, currentLightboxData = null, isLoading = false;
        const PAGE_SIZE = 24;
        /** 判断是否为 GPT 图像模型（支持 auto 尺寸） */
        function isGptImageModel(modelName){
            const m = String(modelName || '').toLowerCase();
            return m.includes('gpt-image') || m === 'auto';
        }

        function uniqueModels(list){
            const seen = new Set();
            return (list || []).map(item => String(item || '').trim()).filter(item => item && !seen.has(item) && seen.add(item));
        }
        function imageProviders(){
            const list = (apiProviders || []).filter(p => p.enabled !== false && (
                (p.image_models || []).length || (p.rh_apps || []).length || (p.rh_workflows || []).length
            ));
            return list.length ? list : [{id:'comfly', name:'Comfly', image_models:[models.gpt, models.nano]}];
        }
        function providerById(id){
            return imageProviders().find(p => p.id === id) || imageProviders()[0];
        }
        function providerModels(id){
            return uniqueModels(providerById(id)?.image_models || [models.gpt]);
        }
        /* ---- RunningHub：同一平台下同步模型 API / 工作流 / AI 应用。
         * 模型 API 直接提交原始模型名；value=app:ID / workflow:ID 走 RH 应用/工作流路径。 */
        function runningHubEntryId(entry, kind){
            if(!entry || typeof entry !== 'object') return '';
            const raw = kind === 'model' ? (entry.model || entry.id || entry.name)
                : kind === 'workflow' ? (entry.workflowId || entry.id)
                : (entry.appId || entry.webappId || entry.id);
            return String(raw || '').trim();
        }
        function runningHubEntries(id){
            const p = providerById(id) || {};
            const collect = (list, kind) => (list || [])
                .filter(e => e && e.enabled !== false && e.hidden !== true)
                .map(e => ({ kind, id: runningHubEntryId(e, kind), title: String(e.title || e.note || '').trim() }))
                .filter(e => e.id);
            const models = uniqueModels(p.image_models || []).map(model => ({kind:'model', id:model, title:model}));
            return [...models, ...collect(p.rh_workflows, 'workflow'), ...collect(p.rh_apps, 'app')];
        }
        function isRunningHubProvider(id){ return providerProtocol(id) === 'runninghub'; }
        function renderProviderControls(){
            const providerSelect = document.getElementById('providerSelect');
            const modelSelect = document.getElementById('modelSelect');
            const providers = imageProviders();
            if(!providers.some(p => p.id === provider)) provider = providers[0]?.id || 'comfly';
            providerSelect.innerHTML = providers.map(p => `<option value="${escapeHtml(p.id)}" ${p.id === provider ? 'selected' : ''}>${escapeHtml(p.name || p.id)}</option>`).join('');
            if(isRunningHubProvider(provider)){
                const entries = runningHubEntries(provider);
                const keys = entries.map(e => e.kind === 'model' ? e.id : `${e.kind}:${e.id}`);
                if(!keys.includes(selectedModel)) selectedModel = keys[0] || '';
                modelSelect.innerHTML = entries.length
                    ? entries.map(e => {
                        const key = e.kind === 'model' ? e.id : `${e.kind}:${e.id}`;
                        const tag = e.kind === 'model' ? '模型 API' : e.kind === 'workflow' ? tr('online.rhWorkflow') : tr('online.rhApp');
                        const label = e.title || e.id;
                        return `<option value="${escapeHtml(key)}" ${key === selectedModel ? 'selected' : ''}>${escapeHtml(`[${tag}] ${label}`)}</option>`;
                    }).join('')
                    : `<option value="">${escapeHtml(tr('online.rhNoEntries'))}</option>`;
            } else {
                const modelsForProvider = providerModels(provider);
                if(!modelsForProvider.includes(selectedModel)) selectedModel = modelsForProvider[0] || models.gpt;
                modelSelect.innerHTML = modelsForProvider.map(m => `<option value="${escapeHtml(m)}" ${m === selectedModel ? 'selected' : ''}>${escapeHtml(m)}</option>`).join('');
            }
            updateAdaptivePanel();
        }

        /* ---- 协议自适应：根据所选 provider 的 protocol 调整参数栏 ----
         * 后端 /api/online-image → generate_ai_image 已按协议分发，前端只需让
         * 与协议无关的控件随之显隐：质量仅 OpenAI 系（gpt-image）生效，其余协议忽略。 */
        function providerProtocol(id){
            const p = providerById(id) || {};
            const proto = String(p.protocol || '').toLowerCase();
            const pid = String(p.id || '').toLowerCase();
            const base = String(p.base_url || '').toLowerCase();
            if(proto === 'modelscope' || pid === 'modelscope') return 'modelscope';
            if(proto === 'runninghub' || pid === 'runninghub') return 'runninghub';
            if(proto === 'jimeng' || pid === 'jimeng') return 'jimeng';
            if(proto === 'volcengine' || pid === 'volcengine') return 'volcengine';
            if(proto === 'gemini') return 'gemini';
            if(proto === 'apimart' || base.includes('apimart.ai')) return 'apimart';
            return 'api';
        }
        const PROTOCOL_BADGE = {
            api:'online.modeApi', apimart:'online.modeApi', modelscope:'online.modeModelscope',
            runninghub:'online.modeRunningHub', jimeng:'online.modeJimeng',
            volcengine:'online.modeVolcengine', gemini:'online.modeGemini'
        };
        // 仅 OpenAI / APIMart（gpt-image 系）后端会消费 quality；其它协议忽略，隐藏以免误导。
        const QUALITY_PROTOCOLS = new Set(['api','apimart']);
        function updateAdaptivePanel(){
            const proto = providerProtocol(provider);
            const badge = document.getElementById('providerModeBadge');
            if(badge){
                badge.textContent = tr(PROTOCOL_BADGE[proto] || 'online.modeApi');
                badge.style.display = '';
            }
            const qf = document.getElementById('qualityField');
            if(qf) qf.style.display = QUALITY_PROTOCOLS.has(proto) ? '' : 'none';
            const qs = document.getElementById('qualitySelect');
            if(qs) qs.value = quality;
            // RunningHub 每次出图都是一次完整工作流运行，隐藏数量并固定为 1，避免误触发多次昂贵任务。
            if(proto === 'runninghub') outputCount = 1;
            const cf = document.getElementById('countField');
            if(cf) cf.style.display = (proto === 'runninghub') ? 'none' : '';
            const cs = document.getElementById('countSelect');
            if(cs) cs.value = String(outputCount);
            // GPT 图像模型支持 auto 尺寸：若当前模型是 gpt-image 系且当前尺寸为默认值，自动切换为 auto
            if(proto !== 'runninghub' && isGptImageModel(selectedModel) && imageSize === '1024x1024'){
                setSize('auto');
            }
            updateSizeUI();
        }
        function setQuality(next){ quality = next || 'auto'; }
        function setCount(next){ outputCount = Math.max(1, Math.min(4, parseInt(next, 10) || 1)); }

        async function initModels(){
            try {
                const cfg = await fetch('/api/config').then(r=>r.json());
                const imageModels = cfg.image_models || [];
                models.nano = imageModels.find(m => m.toLowerCase().includes('nano')) || 'nano-banana-pro';
                models.gpt = imageModels.find(m => !m.toLowerCase().includes('nano')) || cfg.image_model || 'gpt-image-2';
                apiProviders = Array.isArray(cfg.api_providers) ? cfg.api_providers : [];
                selectedModel = providerModels(provider)[0] || models.gpt;
            } catch(e) {}
            renderProviderControls();
        }
        // API 设置页保存后会广播 studio-api 事件；这里重新拉取 /api/config，
        // 尽量保留当前已选的平台/模型，renderProviderControls 会在其不存在时自动回退。
        async function refreshProvidersFromApiSettings(){
            try {
                const cfg = await fetch('/api/config').then(r=>r.json());
                const imageModels = cfg.image_models || [];
                models.nano = imageModels.find(m => m.toLowerCase().includes('nano')) || 'nano-banana-pro';
                models.gpt = imageModels.find(m => !m.toLowerCase().includes('nano')) || cfg.image_model || 'gpt-image-2';
                apiProviders = Array.isArray(cfg.api_providers) ? cfg.api_providers : [];
            } catch(e) { return; }
            renderProviderControls();
        }
        let apiSyncTimer = null;
        function scheduleProviderRefresh(){
            clearTimeout(apiSyncTimer);
            apiSyncTimer = setTimeout(refreshProvidersFromApiSettings, 150);
        }
        try {
            const studioApiChannel = new BroadcastChannel('studio-api');
            studioApiChannel.addEventListener('message', () => scheduleProviderRefresh());
        } catch(e) {}
        // 页面重新可见时也兜底刷新一次（切回标签页 / iframe 重新展示）
        document.addEventListener('visibilitychange', () => { if(!document.hidden) scheduleProviderRefresh(); });

        function setProvider(next){
            provider = next;
            selectedModel = providerModels(provider)[0] || selectedModel;
            renderProviderControls();
        }
        function setModel(next){
            selectedModel = next;
        }
        function escapeHtml(str){ return String(str || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }

        function getImageDimensions(src){
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve({width:img.naturalWidth, height:img.naturalHeight});
                img.onerror = reject;
                img.src = src;
            });
        }
        /** 获取第一个已上传参考图的尺寸，无图返回 null */
        function firstReferenceDimension(){
            return [1,2,3].map(id => refDims[id]).find(dim => dim?.width && dim?.height) || null;
        }

        /**
         * 设置尺寸值，更新输入框与快捷按钮高亮状态。
         * @param {string} value - WxH 格式字符串或 "auto"
         */
        function setSize(value){
            const v = String(value || '').trim().toLowerCase().replace('×','x');
            imageSize = v || '1024x1024';
            const input = document.getElementById('sizeInput');
            if(input) input.value = imageSize;
            // 更新快捷按钮高亮
            const btns = document.querySelectorAll('#sizePresets .size-preset-btn');
            btns.forEach(btn => {
                const preset = (btn.dataset.size || '').toLowerCase().replace('×','x');
                btn.classList.toggle('active', preset === imageSize);
            });
            // 更新"适配图片"按钮状态
            const fitBtn = document.getElementById('fitImageSizeBtn');
            if(fitBtn) fitBtn.disabled = !firstReferenceDimension();
        }

        /** 刷新尺寸 UI 状态（适配按钮可用状态、快捷按钮高亮） */
        function updateSizeUI(){
            setSize(imageSize);
        }

        /**
         * 校验并规范化尺寸值。
         * @param {string} value - 待校验的尺寸字符串
         * @returns {string} 合法的 WxH 或 "auto"，非法时返回 "1024x1024"
         */
        function validateSize(value){
            const v = String(value || '').trim().toLowerCase().replace('×','x');
            if(v === 'auto') return 'auto';
            const match = v.match(/^(\d+)\s*[x*]\s*(\d+)$/);
            if(match){
                const w = parseInt(match[1], 10);
                const h = parseInt(match[2], 10);
                if(w >= 64 && h >= 64 && w <= 8192 && h <= 8192){
                    return `${w}x${h}`;
                }
            }
            return '1024x1024';
        }

        /** 获取当前有效的尺寸值 */
        function currentSize(){
            const input = document.getElementById('sizeInput');
            const raw = input ? input.value : imageSize;
            return validateSize(raw);
        }

        /**
         * "适配图片"按钮回调：读取第一个参考图尺寸，填入输入框。
         * @param {Event} event - 点击事件
         */
        function fitImageSize(event){
            if(event) event.preventDefault();
            const dim = firstReferenceDimension();
            if(!dim) return;
            setSize(`${dim.width}x${dim.height}`);
        }

        [1,2,3].forEach(id => {
            const zone = document.getElementById(`drop-zone-${id}`);
            zone.ondragover = e => { e.preventDefault(); zone.classList.add('drag-over'); };
            zone.ondragleave = () => zone.classList.remove('drag-over');
            zone.ondrop = e => { e.preventDefault(); zone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0], id); };
        });
        window.addEventListener('paste', e => {
            const item = [...(e.clipboardData?.items || [])].find(x => x.kind === 'file' && x.type.startsWith('image/'));
            if (item) handleFile(item.getAsFile(), firstEmptySlot());
        });
        function firstEmptySlot(){ return [1,2,3].find(id => !refs[id]) || 1; }

        async function handleFile(file, index){
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const prev = document.getElementById(`prev${index}`);
                prev.src = e.target.result; prev.classList.remove('hidden');
                document.getElementById(`del${index}`).classList.remove('hidden');
                getImageDimensions(e.target.result).then(dim => {
                    refDims[index] = dim;
                    updateSizeUI();
                }).catch(() => {});
            };
            reader.readAsDataURL(file);
            const form = new FormData();
            form.append('files', file);
            const data = await fetch('/api/ai/upload', {method:'POST', body:form}).then(r=>r.json());
            refs[index] = data.files[0];
        }
        function clearSlot(index, ev){
            if(ev) ev.stopPropagation();
            refs[index] = null;
            refDims[index] = null;
            document.getElementById(`prev${index}`).src = '';
            document.getElementById(`prev${index}`).classList.add('hidden');
            document.getElementById(`del${index}`).classList.add('hidden');
            updateSizeUI();
        }

        /**
         * 将生成的图片列表渲染到主结果区网格中。
         * @param {string[]} images - 图片 URL 数组
         * @param {Function} [onClick] - 单张图片点击回调，接收索引
         */
        function renderOutputGrid(images, onClick){
            const grid = document.getElementById('outputGrid');
            grid.innerHTML = '';
            const multi = Array.isArray(images) && images.length > 1;
            grid.classList.toggle('single', !multi);
            grid.classList.toggle('multi', !!multi);
            (images || []).forEach((url, idx) => {
                const img = document.createElement('img');
                img.src = url; img.alt = `output-${idx+1}`;
                img.onclick = () => onClick ? onClick(idx) : zoomImage(idx);
                grid.appendChild(img);
            });
            grid.classList.remove('hidden');
        }

        async function submitImage(){
            const prompt = document.getElementById('promptInput').value.trim();
            if(!prompt){ alert(tr('online.promptRequired')); return; }
            const btn = document.getElementById('genBtn'), loader = document.getElementById('loader'),
                  placeholder = document.getElementById('placeholder'), grid = document.getElementById('outputGrid'),
                  dl = document.getElementById('downloadBtn');
            btn.disabled = true; placeholder.classList.add('hidden'); grid.classList.add('hidden');
            dl.classList.add('hidden'); loader.classList.remove('hidden');
            try {
                const reqBody = { prompt, provider_id:provider, model:selectedModel, size:currentSize(), n:outputCount, reference_images:Object.values(refs).filter(Boolean) };
                if(QUALITY_PROTOCOLS.has(providerProtocol(provider))) reqBody.quality = quality;
                const result = await fetch('/api/online-image', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify(reqBody)
                }).then(async r => { if(!r.ok) throw new Error((await r.json()).detail || '生成失败'); return r.json(); });
                currentResult = result;
                renderOutputGrid(result.images || [], idx => openLightbox(result, idx));
                dl.href = (result.images || [])[0] || '#';
                dl.classList.remove('hidden');
                renderImageCard(result, true);
            } catch(err) {
                alert(err.message || 'Generation failed'); placeholder.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden'); btn.disabled = false;
            }
        }

        /**
         * 渲染历史记录卡片：多图时以缩略图网格展示，单图保持原样。
         * @param {Object} data - 历史记录数据，含 images 数组
         * @param {boolean} [isNew=false] - 是否插入到最前
         */
        function renderImageCard(data, isNew=false){
            const images = Array.isArray(data.images) ? data.images.filter(Boolean) : [];
            if(!images.length || document.getElementById(`history-${data.timestamp}`)) return;
            const card = document.createElement('div');
            card.id = `history-${data.timestamp}`;
            card.dataset.historyTs = data.timestamp;
            card.className = 'masonry-item group relative cursor-zoom-in';
            card.onclick = () => { if(document.body.classList.contains('history-bulk-selecting')) return; openLightbox(data, 0); };
            const count = images.length;
            let thumbsHtml;
            if(count === 1){
                thumbsHtml = `<img src="${images[0]}" class="w-full h-full object-cover block group-hover:scale-105 transition-transform duration-1000" loading="lazy">`;
            } else {
                const cntCls = `count-${Math.min(count, 4)}`;
                thumbsHtml = `<div class="history-thumbs ${cntCls}">` +
                    images.slice(0, 4).map(u => `<img src="${u}" loading="lazy">`).join('') +
                    `</div>`;
            }
            const multi = count > 1
                ? `<div class="absolute top-3 right-3 bg-black/60 text-white text-[10px] font-black px-2 py-0.5 rounded-full pointer-events-none">×${count}</div>` : '';
            card.innerHTML = `${thumbsHtml}${multi}
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 p-6 flex flex-col justify-end"><p class="text-white text-[10px] font-medium line-clamp-2 uppercase tracking-wider">${data.prompt || tr('online.onlineImageFallback')}</p></div>`;
            isNew ? document.getElementById('masonry').prepend(card) : document.getElementById('masonry').appendChild(card);
            lucide.createIcons();
        }
        async function loadHistory(page=0){
            if(isLoading) return; isLoading = true;
            const loader = document.getElementById('loadMoreTrigger');
            if(page === 0){ loader.innerText = tr('online.loadingArchives'); allHistory = await fetch('/api/history?type=online').then(r=>r.json()); document.getElementById('masonry').innerHTML=''; currentIndex=0; }
            const next = allHistory.slice(currentIndex, currentIndex + PAGE_SIZE);
            next.forEach(item => renderImageCard(item)); currentIndex += next.length;
            loader.classList.toggle('hidden', currentIndex >= allHistory.length);
            loader.innerText = tr('online.loadMore'); isLoading = false;
        }
        let lightboxPreview = null, lightboxIndex = 0;
        function ensureLightboxPreview(){
            if(!lightboxPreview && window.StudioImagePreview){
                lightboxPreview = StudioImagePreview.attach(document.getElementById('lightboxFrame'));
            }
            return lightboxPreview;
        }
        /**
         * 打开 Lightbox 查看大图，支持指定起始索引并翻页。
         * @param {Object} data - 图片数据，含 images 数组
         * @param {number} [startIndex=0] - 起始图片索引
         */
        function openLightbox(data, startIndex=0){
            currentLightboxData = data;
            const images = Array.isArray(data?.images) ? data.images.filter(Boolean) : [];
            lightboxIndex = Math.max(0, Math.min(startIndex|0, images.length - 1));
            const img = document.getElementById('lightboxImg');
            const res = document.getElementById('lightboxRes');
            const pageInd = document.getElementById('lightboxPageIndicator');
            const prevBtn = document.getElementById('lightboxPrev');
            const nextBtn = document.getElementById('lightboxNext');
            res.textContent = '...';
            ensureLightboxPreview();
            if(lightboxPreview) lightboxPreview.reset();
            img.onload = () => { res.textContent = img.naturalWidth && img.naturalHeight ? `${img.naturalWidth} x ${img.naturalHeight}` : (data.params?.size || '--'); };
            img.src = images[lightboxIndex] || '';
            document.getElementById('lightboxPrompt').textContent = data.prompt || '';
            // 翻页控件
            const multi = images.length > 1;
            pageInd.classList.toggle('hidden', !multi);
            prevBtn.classList.toggle('hidden', !multi);
            nextBtn.classList.toggle('hidden', !multi);
            if(multi) pageInd.textContent = `${lightboxIndex + 1} / ${images.length}`;
            document.getElementById('lightbox').classList.replace('hidden','flex');
            document.body.style.overflow='hidden';
            lucide.createIcons();
        }
        /**
         * Lightbox 内部翻页：delta 为 +1 / -1。
         */
        function lightboxNavigate(delta, ev){
            if(ev) ev.stopPropagation();
            const data = currentLightboxData;
            const images = Array.isArray(data?.images) ? data.images.filter(Boolean) : [];
            if(!images.length) return;
            lightboxIndex = (lightboxIndex + delta + images.length) % images.length;
            const img = document.getElementById('lightboxImg');
            const res = document.getElementById('lightboxRes');
            res.textContent = '...';
            if(lightboxPreview) lightboxPreview.reset();
            img.onload = () => { res.textContent = img.naturalWidth && img.naturalHeight ? `${img.naturalWidth} x ${img.naturalHeight}` : (data.params?.size || '--'); };
            img.src = images[lightboxIndex];
            document.getElementById('lightboxPageIndicator').textContent = `${lightboxIndex + 1} / ${images.length}`;
        }
        function closeLightbox(){
            if(lightboxPreview) lightboxPreview.reset();
            document.getElementById('lightbox').classList.replace('flex','hidden');
            document.body.style.overflow='auto';
        }
        function handleOutsideClick(e){ if(e.target.id === 'lightbox') closeLightbox(); }
        /**
         * 下载 Lightbox 中当前展示的图片。
         */
        async function downloadLightboxImage(e){
            e.stopPropagation();
            const images = Array.isArray(currentLightboxData?.images) ? currentLightboxData.images.filter(Boolean) : [];
            const url = images[lightboxIndex];
            if(!url) return;
            const res = await fetch(url);
            if(!res.ok) return alert('下载失败');
            const blob = await res.blob();
            const clean = url.split('?')[0];
            const ext = clean.includes('.') ? clean.split('.').pop() : 'png';
            const suffix = images.length > 1 ? `-${lightboxIndex+1}` : '';
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `online-image-${Date.now()}${suffix}.${ext || 'png'}`;
            document.body.appendChild(link);
            link.click();
            link.remove();
            setTimeout(() => URL.revokeObjectURL(link.href), 1000);
        }
        /**
         * 点击主结果区图片打开 Lightbox。
         * @param {number} [idx=0] - 图片索引
         */
        function zoomImage(idx=0){ if(currentResult) openLightbox(currentResult, idx); }
        function applySameStyle(){
            if(!currentLightboxData) return;
            document.getElementById('promptInput').value = currentLightboxData.prompt || '';
            [1,2,3].forEach(id => clearSlot(id));
            (currentLightboxData.params?.reference_images || []).slice(0,3).forEach((ref,i) => {
                refs[i+1] = ref; const prev = document.getElementById(`prev${i+1}`);
                prev.src = ref.url; prev.classList.remove('hidden'); document.getElementById(`del${i+1}`).classList.remove('hidden');
                getImageDimensions(ref.url).then(dim => {
                    refDims[i+1] = dim;
                    updateSizeUI();
                }).catch(() => {});
            });
            const size = currentLightboxData.params?.size || '1024x1024';
            setSize(size);
            closeLightbox(); window.scrollTo({top:0, behavior:'smooth'});
        }
        async function deleteHistoryItem(ts, ev){
            ev.stopPropagation();
            if(!confirm(tr('online.deleteConfirm'))) return;
            const res = await fetch('/api/history/delete', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({timestamp:ts})}).then(r=>r.json());
            if(res.success) document.getElementById(`history-${ts}`)?.remove();
        }
        const observer = new IntersectionObserver(entries => { if(entries[0].isIntersecting && currentIndex < allHistory.length) loadHistory(1); }, {threshold:.1});
        // Lightbox 键盘导航：←/→ 翻页，Esc 关闭
        document.addEventListener('keydown', e => {
            const lb = document.getElementById('lightbox');
            if(!lb || lb.classList.contains('hidden')) return;
            if(e.key === 'Escape') closeLightbox();
            else if(e.key === 'ArrowLeft') lightboxNavigate(-1);
            else if(e.key === 'ArrowRight') lightboxNavigate(1);
        });
        window.onload = async () => {
            applyLanguage();
            setSize('1024x1024');
            // 绑定尺寸输入框与快捷按钮事件
            const sizeInput = document.getElementById('sizeInput');
            if(sizeInput){
                sizeInput.addEventListener('input', () => {
                    imageSize = String(sizeInput.value || '').trim().toLowerCase().replace('×','x');
                    // 更新快捷按钮高亮
                    const btns = document.querySelectorAll('#sizePresets .size-preset-btn');
                    btns.forEach(btn => {
                        const preset = (btn.dataset.size || '').toLowerCase().replace('×','x');
                        btn.classList.toggle('active', preset === imageSize);
                    });
                });
            }
            document.querySelectorAll('#sizePresets .size-preset-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const val = btn.dataset.size;
                    if(val) setSize(val);
                });
            });
            await initModels();
            await loadHistory(0);
            window.HistoryBulkManager?.attach({masonry:'#masonry'});
            observer.observe(document.getElementById('loadMoreTrigger'));
            document.getElementById('loadMoreTrigger').onclick = () => loadHistory(1);
        };
    </script>
</body>
</html>
