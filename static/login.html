<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Infinite-Canvas - 登录</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/static/vendor/js/tailwindcss-cdn.js?v=2026.07.02.1779934979"></script>
    <style>
        body {
            background-color: #0c0d0f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .glass-card {
            background: rgba(18, 20, 24, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .glow-input:focus {
            border-color: rgba(212, 163, 89, 0.5);
            box-shadow: 0 0 0 2px rgba(212, 163, 89, 0.15);
        }
    </style>
</head>
<body class="relative flex items-center justify-center min-h-screen overflow-hidden text-gray-200">
    <!-- Background glowing blobs -->
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-900/10 blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-amber-900/10 blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md p-2 z-10">
        <div class="glass-card rounded-2xl p-8 flex flex-col">
            <!-- Logo / Title -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold tracking-tight text-white mb-2" style="background: linear-gradient(135deg, #fff 30%, #d4a359 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    Infinite-Canvas
                </h1>
                <p class="text-sm text-gray-400">本地 AI 图像/视频生成画布</p>
            </div>

            <!-- Error Banner -->
            <div id="error-banner" class="hidden mb-4 p-3 rounded-lg bg-red-950/40 border border-red-500/30 text-red-400 text-sm">
                <!-- error message -->
            </div>

            <!-- Notice Banner (if redirected due to expiration) -->
            <div id="notice-banner" class="hidden mb-4 p-3 rounded-lg bg-amber-950/30 border border-amber-500/20 text-amber-300 text-sm">
                <!-- notice message -->
            </div>

            <!-- Form -->
            <form id="login-form" class="space-y-6" onsubmit="handleLogin(event)">
                <div>
                    <label for="username" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">用户名</label>
                    <input type="text" id="username" required autocomplete="username"
                           class="w-full bg-[#16191f] border border-gray-800 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none glow-input transition duration-200"
                           placeholder="请输入用户名">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="password" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">密码</label>
                    </div>
                    <input type="password" id="password" required autocomplete="current-password"
                           class="w-full bg-[#16191f] border border-gray-800 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none glow-input transition duration-200"
                           placeholder="请输入密码">
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center cursor-pointer text-gray-400 select-none">
                        <input type="checkbox" id="remember_me" class="rounded border-gray-850 bg-[#16191f] text-[#d4a359] focus:ring-0 mr-2 cursor-pointer">
                        记住我 (7天免登录)
                    </label>
                </div>

                <button type="submit" id="submit-btn"
                        class="w-full py-3.5 rounded-xl font-semibold text-black transition duration-200 bg-[#d4a359] hover:bg-[#c2924b] focus:outline-none">
                    登录
                </button>
            </form>

            <!-- Register Link -->
            <div class="mt-8 text-center text-sm text-gray-400">
                还没有账号？
                <a href="/static/register.html?v=2026.07.02.1783072950" class="text-[#d4a359] hover:underline font-medium">去注册</a>
            </div>
        </div>
    </div>

    <script>
        // Check for notice or redirect messages in URL
        const params = new URLSearchParams(window.location.search);
        if (params.get('expired')) {
            const banner = document.getElementById('notice-banner');
            banner.textContent = '登录会话已过期，请重新登录。';
            banner.classList.remove('hidden');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const errorBanner = document.getElementById('error-banner');
            const submitBtn = document.getElementById('submit-btn');
            
            errorBanner.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember_me').checked;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, remember_me: rememberMe })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '登录失败，请检查网络后重试。');
                }

                // Successful login
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('user_info', JSON.stringify(data.user));

                // Redirect to original page
                let redirectUrl = params.get('redirect');
                if (redirectUrl) {
                    window.location.href = decodeURIComponent(redirectUrl);
                } else {
                    window.location.href = '/';
                }
            } catch (err) {
                errorBanner.textContent = err.message;
                errorBanner.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = '登录';
            }
        }
    </script>
</body>
</html>
