<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Infinite-Canvas - 注册</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/static/vendor/js/tailwindcss-cdn.js?v=2026.07.02.1779934979"></script>
    <style>
        body {
            background-color: #0c0d0f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .glass-card {
            background: rgba(18, 20, 24, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .glow-input:focus {
            border-color: rgba(212, 163, 89, 0.5);
            box-shadow: 0 0 0 2px rgba(212, 163, 89, 0.15);
        }
    </style>
</head>
<body class="relative flex items-center justify-center min-h-screen overflow-hidden text-gray-200">
    <!-- Background glowing blobs -->
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-900/10 blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-amber-900/10 blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md p-2 z-10">
        <div class="glass-card rounded-2xl p-8 flex flex-col">
            <!-- Logo / Title -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold tracking-tight text-white mb-2" style="background: linear-gradient(135deg, #fff 30%, #d4a359 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    新建账户
                </h1>
                <p class="text-sm text-gray-400">注册以使用隔离的个人空间</p>
            </div>

            <!-- Error Banner -->
            <div id="error-banner" class="hidden mb-4 p-3 rounded-lg bg-red-950/40 border border-red-500/30 text-red-400 text-sm">
                <!-- error message -->
            </div>

            <!-- Success Banner -->
            <div id="success-banner" class="hidden mb-4 p-3 rounded-lg bg-green-950/40 border border-green-500/30 text-green-400 text-sm">
                <!-- success message -->
            </div>

            <!-- Form -->
            <form id="register-form" class="space-y-5" onsubmit="handleRegister(event)">
                <div>
                    <label for="username" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">用户名</label>
                    <input type="text" id="username" required autocomplete="username" minlength="2" maxlength="50"
                           class="w-full bg-[#16191f] border border-gray-800 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none glow-input transition duration-200"
                           placeholder="2-50 位字母、数字或字符">
                </div>

                <div>
                    <label for="display_name" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">昵称 (可选)</label>
                    <input type="text" id="display_name" maxlength="50"
                           class="w-full bg-[#16191f] border border-gray-800 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none glow-input transition duration-200"
                           placeholder="您的显示昵称">
                </div>

                <div>
                    <label for="password" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">密码</label>
                    <input type="password" id="password" required autocomplete="new-password" minlength="4" maxlength="50"
                           class="w-full bg-[#16191f] border border-gray-800 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none glow-input transition duration-200"
                           placeholder="不低于 4 位密码">
                </div>

                <div>
                    <label for="confirm_password" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">确认密码</label>
                    <input type="password" id="confirm_password" required autocomplete="new-password"
                           class="w-full bg-[#16191f] border border-gray-800 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none glow-input transition duration-200"
                           placeholder="再次输入您的密码">
                </div>

                <button type="submit" id="submit-btn"
                        class="w-full py-3.5 rounded-xl font-semibold text-black transition duration-200 bg-[#d4a359] hover:bg-[#c2924b] focus:outline-none mt-2">
                    注册
                </button>
            </form>

            <!-- Login Link -->
            <div class="mt-8 text-center text-sm text-gray-400">
                已有账号？
                <a href="/static/login.html?v=2026.07.02.1783073108" class="text-[#d4a359] hover:underline font-medium">去登录</a>
            </div>
        </div>
    </div>

    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const errorBanner = document.getElementById('error-banner');
            const successBanner = document.getElementById('success-banner');
            const submitBtn = document.getElementById('submit-btn');
            
            errorBanner.classList.add('hidden');
            successBanner.classList.add('hidden');

            const username = document.getElementById('username').value.trim();
            const displayName = document.getElementById('display_name').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (password !== confirmPassword) {
                errorBanner.textContent = '两次输入的密码不一致。';
                errorBanner.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '注册中...';

            try {
            const requestBody = {
                        username,
                        password
                    };
                    if (displayName) {
                        requestBody.display_name = displayName;
                    }

                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '注册失败，该用户名可能已被占用。');
                }

                // Successful registration
                successBanner.textContent = data.message || '注册成功！正在跳转至登录页...';
                successBanner.classList.remove('hidden');

                setTimeout(() => {
                    window.location.href = '/static/login.html';
                }, 1500);

            } catch (err) {
                errorBanner.textContent = err.message;
                errorBanner.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = '注册';
            }
        }
    </script>
</body>
</html>
